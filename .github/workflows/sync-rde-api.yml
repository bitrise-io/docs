name: Sync RDE API reference

# Keeps docs/bitrise-rde-api/ in sync with the hosted RDE OpenAPI spec.
# Runs nightly and can be triggered manually from the Actions tab ("Run
# workflow"). When the spec has actually changed it regenerates the reference
# and opens a PR for review — it never commits to main directly.
on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:

concurrency:
  group: sync-rde-api
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Compares a SHA-256 of the live spec against the stored hash. Rewrites
      # api/bitrise-rde.json (and the state file) only when the content changed.
      - name: Check for RDE spec changes
        id: sync
        run: |
          python3 scripts/sync_rde_spec.py | tee sync-result.json
          status=$(python3 -c "import json; print(json.load(open('sync-result.json'))['status'])")
          echo "status=$status" >> "$GITHUB_OUTPUT"
          rm -f sync-result.json

      - name: Set up Node
        if: steps.sync.outputs.status != 'unchanged'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Regenerate the RDE reference
        if: steps.sync.outputs.status != 'unchanged'
        run: |
          npm install
          npm run docusaurus -- gen-api-docs bitriseRDE
          node scripts/patch-api-info.js

      # Opens (or updates) a PR with the regenerated reference. Uses a PAT/App
      # token when available so the PR triggers the deploy preview + checks;
      # falls back to GITHUB_TOKEN (PR opens, but no downstream checks run).
      - name: Open PR
        if: steps.sync.outputs.status != 'unchanged'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.RDE_SYNC_TOKEN || github.token }}
          base: main
          branch: auto/rde-api-sync
          delete-branch: true
          add-paths: |
            api/bitrise-rde.json
            scripts/rde_spec_sync_state.json
            docs/bitrise-rde-api/**
          commit-message: 'docs: regenerate RDE API reference from updated swagger'
          title: 'docs: sync RDE API reference from updated spec'
          labels: |
            automated
            documentation
          body: |
            Automated regeneration of the Remote Dev Environments API reference —
            the hosted spec at `https://api.bitrise.io/rde/api-docs/swagger.json`
            changed since the last sync.

            - Updated snapshot: `api/bitrise-rde.json`
            - Regenerated pages: `docs/bitrise-rde-api/api-reference/`

            Review the diff (the spec change is reviewable in `api/bitrise-rde.json`)
            and merge to publish. Triggered by `.github/workflows/sync-rde-api.yml`.
