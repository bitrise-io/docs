  bitrise_products:
    - Bitrise
    - Bitrise CI
    - Bitrise Platform
    - Bitrise Insights
    - Build Cache
    - Release Management
    - Bitrise MCP
    - Workflow Editor
    - Bitrise CLI
    - Cloud Controller          # "Bitrise on AWS: Cloud Controller"
    - bitrise.io
    - bitrise.yml
    - Bitrise Step
    - Bitrise Steps

