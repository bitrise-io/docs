# ============================================================================
# Bitrise docs — Japanese translation "do-not-translate" glossary
# ============================================================================
# Purpose: fed to the translate-on-PR Claude API job. Any term listed here must
# be kept VERBATIM in English in the Japanese output (not translated, not
# transliterated to katakana), because it is a product name, UI label, brand,
# acronym, or code literal.
#
# How the pipeline uses this file:
#   1. `protect_patterns` are applied FIRST via regex — code, URLs, env vars,
#      filenames, MDX/Docusaurus syntax are masked so the model never touches
#      them. This is structural and catches the long tail automatically.
#   2. `do_not_translate` terms are injected into the translation prompt as a
#      hard rule ("keep these exactly as written").
#   3. `preferred_translations` (optional, for later) pins the ONE approved
#      Japanese rendering for terms we DO translate but want consistent.
#
# STATUS: v1 — built from the live product, not hand-typed. UI labels extracted from
#   bitrise-website + bitrise-workflow-editor, cross-checked against the docs, audited
#   for gaps, and cleaned. Step names added from the docs coverage pass.
#
# KEY ASSUMPTION: the Bitrise app UI is English-only for Japanese users, so every
#   on-screen string must stay English in the JA docs. If the app UI is ever localized
#   to Japanese, this premise flips and the glossary must be rethought.
#   >> CONFIRMED with product/frontend: app UI stays English-only; no plan to localize to JA. <<
#
# MAINTENANCE: this is a snapshot of today's product and WILL go stale as the UI changes.
#   The translate-on-PR pipeline should re-run extract_ui_strings.py so this file stays
#   current automatically; until that exists, re-run the extraction periodically.
#
# COVERAGE: covers the two main app repos. Not yet included — Remote Dev Environments
#   (bitrise-codespaces) and the design system (bitkit); step names are doc-mined rather
#   than pulled from the canonical bitrise-steplib list. Low impact for docs, but noted.
# ============================================================================

# ----------------------------------------------------------------------------
# 1. PATTERN-BASED PROTECTION (regex, applied before the model sees the text)
#    These need no term list — they protect by shape. Keep/extend as needed.
# ----------------------------------------------------------------------------
protect_patterns:
  - name: fenced_code_block        # ```...```  (multi-line code)
    regex: '```[\s\S]*?```'
  - name: inline_code              # `foo`
    regex: '`[^`]+`'
  - name: url                      # https://... http://...
    regex: 'https?://[^\s)]+'
  - name: nt_span                  # whole <NT>...</NT> spans — matched before mdx_component,
    regex: '<NT\b[^>]*>[\s\S]*?</NT>'  #   which would otherwise mask the tags one at a time and
                                    #   leave the protected text exposed in between
  - name: env_var                  # BITRISE_BUILD_NUMBER, GIT_HTTP_PASSWORD, $FOO
    regex: '\$?[A-Z][A-Z0-9_]{2,}'
  - name: filename                 # bitrise.yml, Podfile.lock, build.gradle
    regex: '\S+\.(yml|yaml|json|sh|rb|swift|kt|kts|java|md|mdx|plist|xml|gradle|podspec|toml|lock|cfg|env)'
  - name: mdx_component            # <Tabs>, <CodeBlock>, </Admonition>
    regex: '</?[A-Za-z][^>]*>'
  - name: docusaurus_admonition    # :::note  :::tip  :::warning
    regex: ':::[a-z]+'
  - name: template_placeholder     # {{ var }}, {% ... %}, ${...}
    regex: '(\{\{[^}]*\}\}|\{%[^%]*%\}|\$\{[^}]*\})'
  - name: frontmatter_keys         # do not translate YAML front-matter KEYS (values may translate)
    regex: '^[a-zA-Z0-9_-]+:'

# ----------------------------------------------------------------------------
# 2. BITRISE BRAND & PRODUCT NAMES — never translated, ever
# ----------------------------------------------------------------------------
